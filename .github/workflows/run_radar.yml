name: Radar Inmobiliario Vitacura

on:
  schedule:
    # Corre cada 1 hora (al minuto 0)
    # En Chile (UTC-3)
    - cron: '0 10,20 * * *'
  workflow_dispatch: # Botón manual para pruebas

jobs:
  build:
    runs-on: ubuntu-latest

    # Permisos necesarios para que el bot pueda guardar el estado_mercado.json
    permissions:
      contents: write

    steps:
    - name: Checkout del código
      uses: actions/checkout@v4

    - name: Configurar Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Instalar dependencias
      run: |
        python -m pip install --upgrade pip
        pip install selenium webdriver-manager requests

    - name: Ejecutar Radar de Búsqueda
      env:
        PASSWORD_APP: ${{ secrets.PASSWORD_APP }}
      run: python radar.py

    - name: Guardar base de datos actualizada
      run: |
        git config --global user.name "GitHub Action Bot"
        git config --global user.email "actions@github.com"
        git add estado_mercado.json
        # Solo hace commit si hay cambios reales en el JSON
        git diff --quiet && git diff --staged --quiet || (git commit -m "Update property database [skip ci]" && git push)

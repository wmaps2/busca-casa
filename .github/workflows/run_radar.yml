name: Radar Inmobiliario Mensual
on:
  schedule:
    - cron: '0 * * * *' # Cada hora (en punto)
  workflow_dispatch: # Permite correrlo manual desde el botón de GitHub

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout código
        uses: actions/checkout@v3

      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Instalar dependencias
        run: |
          pip install selenium webdriver-manager requests

      - name: Ejecutar Radar
        env:
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          PASSWORD_APP: ${{ secrets.PASSWORD_APP }}
        run: |
          # Si la hora actual es 12:00 UTC (9:00 AM Chile aprox), mandamos el diario
          HOUR=$(date +%H)
          if [ "$HOUR" == "12" ]; then
            python radar.py --daily
          else
            python radar.py
          fi

      - name: Guardar estado para la próxima hora
        run: |
          git config --global user.name 'RadarBot'
          git config --global user.email 'bot@radar.com'
          git add estado_mercado.json
          git commit -m "Actualizar base de datos" || echo "No hay cambios"
          git push

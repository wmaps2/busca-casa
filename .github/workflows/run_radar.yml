name: Radar Busca-Casa Cloud
on:
  schedule:
    - cron: '0 * * * *' # Corre cada hora
  workflow_dispatch:

jobs:
  run-radar:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4 # <--- ACTUALIZADO

      - name: Setup Python
        uses: actions/setup-python@v5 # <--- ACTUALIZADO
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install selenium webdriver-manager requests

      - name: Run Script
        env:
          PASSWORD_APP: ${{ secrets.PASSWORD_APP }}
        run: |
          HOUR=$(date +%H)
          if [ "$HOUR" == "12" ]; then
            python radar.py --daily
          else
            python radar.py
          fi

      - name: Save State
        run: |
          git config --global user.name 'GitHub Action'
          git config --global user.email 'action@github.com'
          git add estado_mercado.json
          git commit -m "Update state" || echo "No changes"
          git push

name: Radar Inmobiliario Vitacura

on:
  schedule:
    # Corre cada 1 hora (minuto 0 de cada hora)
    - cron: '0 * * * *'
  workflow_dispatch: # Permite correrlo manualmente para probar

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout del repositorio
      uses: actions/checkout@v4

    - name: Configurar Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Instalar dependencias
      run: |
        python -m pip install --upgrade pip
        pip install selenium webdriver-manager requests

    - name: Ejecutar Radar
      env:
        PASSWORD_APP: ${{ secrets.PASSWORD_APP }}
      run: python run_radar.py

    - name: Persistir estado (Guardar lo que ya vimos)
      run: |
        git config --global user.name "GitHub Action Bot"
        git config --global user.email "actions@github.com"
        git add estado_mercado.json
        git commit -m "Update property database [skip ci]" || echo "No hay cambios para guardar"
        git push
